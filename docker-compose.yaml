services:
  db:
    image: postgres:17
    container_name: wino-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - wino-network

  backend:
    build: ./backend
    container_name: wino-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mydb 
      SPRING_DATASOURCE_USERNAME: myuser                     
      SPRING_DATASOURCE_PASSWORD: mypassword
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - wino-network

  frontend:
    build: ./front_web
    container_name: wino-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - wino-network

  # desktop_builder:
  #   build: ./desktop
  #   volumes:
  #     - ./dist:/out
  #   depends_on:
  #     - backend

volumes:
  db_data:

networks:
  wino-network:
    driver: bridge



